<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #fafae2;
  color: #333;
  visibility: hidden;
}

/* HEADER */
header {
  background: #345A46;
  color: white;
  position: relative;
  height: 100px;
  padding: 15px;
  overflow: hidden;
}

.logo {
  position: absolute;
  top: 1px;
  right: 1px;
  width: 180px;
  max-width: 40%;
}

header h1 {
  position: absolute;
  left: 20px;
  bottom: 45px;
  margin: 0;
  font-size: 22px;
}

header p {
  position: absolute;
  left: 20px;
  bottom: 15px;
  margin: 0;
  font-size: 14px;
  opacity: 0.8;
}

/* GRID */
section { padding: 20px; }

h2 { font-size: 18px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
}

/* CARD */
.card {
  background: #8ca27a;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  text-align: center;
  padding-bottom: 12px;
}

.card img {
  width: 100%;
  cursor: pointer;
  transition: transform 0.25s ease;
}

/* 🔥 HOVER PIÙ AGGRESSIVO */
.card img:hover {
  transform: scale(1.12);
}

/* TEXT */
.desc {
  font-size: 12px;
  margin: 6px 8px;
  opacity: 0.9;
}

.customize {
  font-size: 13px;
  color: #0b4f2c;
  font-weight: bold;
  cursor: pointer;
  margin-top: 6px;
  display: inline-block;
}

/* CTA */
.cta {
  text-align: center;
  padding: 20px;
}

.cta a {
  display: inline-block;
  background: #25D366;
  color: white;
  padding: 12px 18px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: bold;
  width: 220px;
  margin-bottom: 10px;
}

.cta a:last-child {
  background: #3b82f6;
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.lightbox img {
  max-width: 95%;
  max-height: 95%;
  transform-origin: center;
  transition: transform 0.2s ease;
  cursor: zoom-in;
}

/* MOBILE */
@media (max-width: 500px) {
  header { height: 100px; }
  header h1 { font-size: 18px; bottom: 35px; }
  header p { font-size: 12px; }
}
</style>
</head>

<body>

<header>
  <img src="images/logo_green.png" class="logo">
  <h1 id="h1"></h1>
  <p id="subtitle"></p>
</header>

<section>
<h2 id="c1"></h2>
<div class="grid">

  <div class="card">
    <img src="images/b01.png" onclick="openLightbox(this)">
    <div class="desc" id="d1"></div>
    <div class="customize" onclick="wa('B01')"></div>
  </div>

  <div class="card">
    <img src="images/b02.png" onclick="openLightbox(this)">
    <div class="desc" id="d2"></div>
    <div class="customize" onclick="wa('B02')"></div>
  </div>

  <div class="card">
    <img src="images/b03.png" onclick="openLightbox(this)">
    <div class="desc" id="d3"></div>
    <div class="customize" onclick="wa('B03')"></div>
  </div>

</div>
</section>

<section>
<h2 id="c2"></h2>
<div class="grid">

  <div class="card">
    <img src="images/c01.png" onclick="openLightbox(this)">
    <div class="desc" id="d4"></div>
    <div class="customize" onclick="wa('C01')"></div>
  </div>

  <div class="card">
    <img src="images/c02.png" onclick="openLightbox(this)">
    <div class="desc" id="d5"></div>
    <div class="customize" onclick="wa('C02')"></div>
  </div>

</div>
</section>

<section>
<h2 id="c3"></h2>
<div class="grid">

  <div class="card">
    <img src="images/p01.png" onclick="openLightbox(this)">
    <div class="desc" id="d6"></div>
    <div class="customize" onclick="wa('P01')"></div>
  </div>

  <div class="card">
    <img src="images/e01.png" onclick="openLightbox(this)">
    <div class="desc" id="d7"></div>
    <div class="customize" onclick="wa('E01')"></div>
  </div>

</div>
</section>

<section>
<h2 id="c4"></h2>
</section>

<div class="cta">
  <a id="cta" href="https://wa.me/39TUONUMEROQUI"></a>
  <a id="ctaMail" href="mailto:tuaemail@esempio.com"></a>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <img id="lightbox-img">
</div>

<script>

/* 🌍 TESTI ORIGINALI RIPRISTINATI */
const t = {
  it: {
    title: "SadPro Studio - Biglietti personalizzati di alta qualità per ogni occasione!",
    h1: "Biglietti personalizzati in giornata",
    subtitle: "Scegli il modello che ti piace e te lo personalizzerò in poche ore",
    c1: "Compleanni",
    c2: "Sacramenti",
    c3: "Altre occasioni",
    c4: "Non hai trovato quello che cerchi? Scrivimi e te ne preparo uno su misura!",
    desc: "Modello personalizzabile con colori, nomi e testo.",
    customize: "Personalizza questo",
    cta: "Scrivimi su WhatsApp!",
    ctaMail: "Scrivimi via Email!",
    waText: "Ciao! Vorrei questo modello (",
    waEnd: ") personalizzato con modifiche su colori e testo."
  },
  en: {
    title: "SadPro Studio - Custom quality cards for any occasion!",
    h1: "Custom cards in 24h",
    subtitle: "Pick a design you like and I’ll customize it for you",
    c1: "Birthdays",
    c2: "Religious Functions",
    c3: "Other occasions",
    c4: "Haven’t found what you’re looking for? Message me!",
    desc: "Fully customizable design with names, colors and text.",
    customize: "Customize this",
    cta: "Message me on WhatsApp!",
    ctaMail: "Send me an Email!",
    waText: "Hi! I would like this design (",
    waEnd: ") customized with changes to colors and text."
  }
};

const lang = (navigator.language || "").toLowerCase();
const isIT = lang.startsWith("it");
const text = isIT ? t.it : t.en;

/* APPLY TEXT */
document.title = text.title;
h1.innerText = text.h1;
subtitle.innerText = text.subtitle;
c1.innerText = text.c1;
c2.innerText = text.c2;
c3.innerText = text.c3;
c4.innerText = text.c4;
cta.innerText = text.cta;
ctaMail.innerText = text.ctaMail;

/* DESCRIZIONI */
document.querySelectorAll(".desc").forEach(el => {
  el.innerText = text.desc;
});

document.querySelectorAll(".customize").forEach(el => {
  el.innerText = text.customize;
});

/* WHATSAPP */
function wa(code){
  const msg = text.waText + code + text.waEnd;
  window.open("https://wa.me/39TUONUMEROQUI?text=" + encodeURIComponent(msg), "_blank");
}

/* LIGHTBOX + ZOOM */
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightbox-img");

let zoom = 1;

function openLightbox(img){
  lightbox.style.display = "flex";
  lightboxImg.src = img.src;
  zoom = 1;
  lightboxImg.style.transform = "scale(1)";
}

lightbox.addEventListener("click", () => {
  lightbox.style.display = "none";
});

/* zoom scroll */
lightboxImg.addEventListener("wheel", (e) => {
  e.preventDefault();
  zoom += (e.deltaY < 0) ? 0.15 : -0.15;
  zoom = Math.min(Math.max(1, zoom), 4);
  lightboxImg.style.transform = `scale(${zoom})`;
});

document.body.style.visibility = "visible";

</script>

</body>
</html>
