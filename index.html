<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #fafae2;
    color: #333;
    visibility: hidden;
  }

  header {
    background: #345A46;
    color: white;
    position: relative;
    height: 100px;
    padding: 15px;
    overflow: hidden;
  }

  .logo {
    position: absolute;
    top: 1px;
    right: 1px;
    width: 200px;
    max-width: 40%;
    height: auto;
  }

  header h1 {
    position: absolute;
    left: 20px;
    bottom: 45px;
    margin: 0;
    font-size: 22px;
    text-align: left;
  }

  header p {
    position: absolute;
    left: 20px;
    bottom: 15px;
    margin: 0;
    font-size: 14px;
    opacity: 0.8;
    text-align: left;
  }

  section {
    padding: 20px;
  }

  h2 {
    margin-bottom: 10px;
    font-size: 18px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
  }

  .card {
    background: #8ca27a;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    text-align: center;
    padding-bottom: 10px;
  }

  .card img {
    width: 100%;
    display: block;
  }

  .code {
    font-size: 13px;
    margin-top: 8px;
    font-weight: bold;
  }

  .cta {
    text-align: center;
    padding: 20px;
  }

  .cta a {
    display: inline-block;
    background: #25D366;
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: bold;
    width: 220px;
  }

  /* bottone email */
  .cta a:last-child {
    background: #3b82f6;
  }

  /* 📱 MOBILE */
  @media (max-width: 500px) {
    header {
      height: 100px;
      padding: 10px;
    }

    .logo {
      width: 150px;
      max-width: 45%;
      top: 1px;
      right: 1px;
    }

    header h1 {
      font-size: 18px;
      bottom: 35px;
      left: 15px;
    }

    header p {
      font-size: 12px;
      bottom: 10px;
      left: 15px;
    }
  }
</style>
  
</head>

<body>

<header>
  <img src="images/logo_green.png" alt="Logo" class="logo">
  <h1 id="h1"></h1>
  <p id="subtitle"></p>
</header>

<section>
  <h2 id="c1"></h2>
  <div class="grid">
    <div class="card">
      <img src="images/b01.png">
      <div class="code">B01</div>
    </div>
    <div class="card">
      <img src="images/b02.png">
      <div class="code">B02</div>
    </div>
    <div class="card">
      <img src="images/b03.png">
      <div class="code">B03</div>
    </div>
  </div>
</section>

<section>
  <h2 id="c2"></h2>
  <div class="grid">
    <div class="card">
      <img src="images/c01.png">
      <div class="code">C01</div>
    </div>
    <div class="card">
      <img src="images/c02.png">
      <div class="code">C02</div>
    </div>
  </div>
</section>

<section>
  <h2 id="c3"></h2>
  <div class="grid">
    <div class="card">
      <img src="images/p01.png">
      <div class="code">P01</div>
    </div>
    <div class="card">
      <img src="images/e01.png">
      <div class="code">E01</div>
    </div>
  </div>
</section>

<section>
  <h2 id="c4"></h2>
</section>

<div class="cta">
  <a href="https://wa.me/39TUONUMEROQUI" target="_blank" id="cta"></a>
  <br><br>
  <a href="mailto:tuaemail@esempio.com" id="ctaMail"></a>
</div>

<script>
const t = {
  it: {
    title: "SadPro Studio - Biglietti personalizzati di alta qualità per ogni occasione!",
    h1: "Biglietti personalizzati in giornata",
    subtitle: "Scegli il modello che ti piace e te lo personalizzerò in poche ore",
    c1: "Compleanni",
    c2: "Sacramenti",
    c3: "Altre occasioni",
    c4: "Non hai trovato quello che cerchi? Scrivimi e te ne preparo uno su misura!",
    cta: "Scrivimi su WhatsApp!",
    ctaMail: "Scrivimi via Email!"
  },
  en: {
    title: "SadPro Studio - Custom quality cards for any occasion!",
    h1: "Custom cards in 24h",
    subtitle: "Pick a design you like and I'll customize it for you in just a few hours",
    c1: "Birthdays",
    c2: "Religious Functions",
    c3: "Other occasions",
    c4: "Haven't found what you're looking for? Message me and I'll make one from scratch according to your needs!",
    cta: "Message me on WhatsApp!",
    ctaMail: "Send me an Email!"
  }
};

// lingua browser
const lang = (navigator.language || navigator.userLanguage).toLowerCase();
const isItalian = lang.startsWith("it");

const text = isItalian ? t.it : t.en;

// applica testi
document.title = text.title;
document.getElementById("h1").innerText = text.h1;
document.getElementById("subtitle").innerText = text.subtitle;
document.getElementById("c1").innerText = text.c1;
document.getElementById("c2").innerText = text.c2;
document.getElementById("c3").innerText = text.c3;
document.getElementById("c4").innerText = text.c4;
document.getElementById("cta").innerText = text.cta;
document.getElementById("ctaMail").innerText = text.ctaMail;

// mostra pagina solo dopo traduzione
document.body.style.visibility = "visible";
</script>

</body>
</html>
