<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="title">Biglietti personalizzati</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #fafae2;
      color: #333;
    }

    header {
      background: #345A46;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header p {
      margin-top: 10px;
      font-size: 14px;
      opacity: 0.8;
    }

    section { padding: 20px; }

    h2 { margin-bottom: 10px; font-size: 18px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
    }

    .card {
      background: #8ca27a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: center;
      padding-bottom: 10px;
    }

    .card img {
      width: 100%;
      display: block;
    }

    .code {
      font-size: 13px;
      margin-top: 8px;
      font-weight: bold;
    }

    .cta {
      text-align: center;
      padding: 20px;
    }

    .cta a {
      display: inline-block;
      background: #25D366;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  <h1 id="h1"></h1>
  <p id="subtitle"></p>
</header>

<section>
  <h2 id="c1"></h2>
  <div class="grid"></div>
</section>

<section>
  <h2 id="c2"></h2>
  <div class="grid"></div>
</section>

<section>
  <h2 id="c3"></h2>
  <div class="grid"></div>
</section>

<section>
  <h2 id="c4"></h2>
</section>

<div class="cta">
  <a href="https://wa.me/39TUONUMEROQUI" target="_blank" id="cta"></a>
</div>

<script>
const lang = (navigator.language || navigator.userLanguage).toLowerCase();
const isItalian = lang.startsWith("it");

const t = {
  it: {
    title: "Biglietti personalizzati",
    h1: "Biglietti personalizzati in giornata",
    subtitle: "Scegli un modello → te lo personalizzo in poche ore",
    c1: "🎉 Compleanni",
    c2: "⛪ Comunioni",
    c3: "✨ Altre occasioni",
    c4: "Non hai trovato quello che cerchi? Scrivimi come lo vorresti e ti preparo qualcosa su misura!",
    cta: "Scrivimi su WhatsApp!"
  },
  en: {
    title: "Custom cards",
    h1: "Custom cards in 24h",
    subtitle: "Pick a design → I customize it in a few hours",
    c1: "🎉 Birthdays",
    c2: "⛪ Communions",
    c3: "✨ Other occasions",
    c4: "Didn't find what you're looking for? Message me and I'll create something custom!",
    cta: "Message me on WhatsApp!"
  }
};

const text = isItalian ? t.it : t.en;

document.title = text.title;
document.getElementById("h1").innerText = text.h1;
document.getElementById("subtitle").innerText = text.subtitle;
document.getElementById("c1").innerText = text.c1;
document.getElementById("c2").innerText = text.c2;
document.getElementById("c3").innerText = text.c3;
document.getElementById("c4").innerText = text.c4;
document.getElementById("cta").innerText = text.cta;
</script>

</body>
</html>
