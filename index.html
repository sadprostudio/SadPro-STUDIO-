<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SadPro Studio</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #fafae2;
  visibility: hidden;
  color: #333;
}

header {
  background: #345A46;
  color: white;
  position: relative;
  height: 100px;
  padding: 15px;
  overflow: hidden;
}

.logo {
  position: absolute;
  top: 1px;
  right: 1px;
  width: 180px;
}

header h1 {
  position: absolute;
  left: 20px;
  bottom: 45px;
  margin: 0;
  font-size: 22px;
}

header p {
  position: absolute;
  left: 20px;
  bottom: 15px;
  margin: 0;
  font-size: 14px;
}

section { padding: 20px; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
}

.card {
  background: #8ca27a;
  border-radius: 10px;
  overflow: hidden;
  text-align: center;
  padding-bottom: 10px;
}

.card img {
  width: 100%;
  cursor: pointer;
  transition: 0.25s;
}

.card img:hover {
  transform: scale(1.12);
}

.desc {
  font-size: 12px;
  margin: 6px;
  opacity: 0.9;
}

.customize {
  font-size: 13px;
  font-weight: bold;
  color: #0b4f2c;
  cursor: pointer;
}

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
}

.lightbox img {
  max-width: 95%;
  max-height: 95%;
}

.cta {
  text-align: center;
  padding: 20px;
}

.cta a {
  display: block;
  width: 220px;
  margin: 10px auto;
  padding: 12px;
  border-radius: 8px;
  color: white;
  text-decoration: none;
}

.whatsapp { background: #25D366; }
.email { background: #3b82f6; }

.footer {
  background: #345A46;
  color: white;
  text-align: center;
  padding: 15px;
  font-size: 12px;
}
</style>
</head>

<body>

<header>
  <img src="images/logo_green.png" class="logo">
  <h1 id="h1"></h1>
  <p id="subtitle"></p>
</header>

<section>
  <h2 id="c1"></h2>
  <div class="grid" id="grid"></div>
</section>

<div class="cta">
  <a class="whatsapp" id="cta"></a>
  <a class="email" id="ctaMail"></a>
</div>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg">
</div>

<footer class="footer" id="footer"></footer>

<script src="products.js"></script>

<script>
const t = {
  it: {
    h1: "Biglietti personalizzati in giornata",
    subtitle: "Scegli il modello e lo personalizzo per te",
    cta: "Scrivimi su WhatsApp",
    ctaMail: "Scrivimi via Email",
    footer: "Tutte le opere sono realizzate manualmente, non generate con intelligenza artificiale.",
    customize: "Personalizza questo"
  },
  en: {
    h1: "Custom cards in 24h",
    subtitle: "Pick a design and I’ll customize it",
    cta: "Message me on WhatsApp",
    ctaMail: "Send me an Email",
    footer: "All works are handmade, not generated by AI.",
    customize: "Customize this"
  }
};

const isIT = (navigator.language || "").startsWith("it");
const text = isIT ? t.it : t.en;

/* TEXT */
h1.innerText = text.h1;
subtitle.innerText = text.subtitle;
cta.innerText = text.cta;
ctaMail.innerText = text.ctaMail;
footer.innerText = text.footer;

/* WHATSAPP */
const WA = "39TUONUMEROQUI";

function wa(id, img){
  const url = location.origin + "/" + img;

  const msg =
`Ciao! Vorrei il modello ${id}
Link: ${url}
Vorrei personalizzarlo.`;

  window.open(
    `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,
    "_blank"
  );
}

/* RENDER */
const grid = document.getElementById("grid");

products.forEach(p => {
  grid.innerHTML += `
    <div class="card">
      <img src="${p.img}" onclick="openLightbox(this)">
      <div class="desc">${isIT ? p.desc_it : p.desc_en}</div>
      <div class="customize" onclick="wa('${p.id}','${p.img}')">
        ${text.customize}
      </div>
    </div>
  `;
});

/* LIGHTBOX */
const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");

function openLightbox(img){
  lightbox.style.display = "flex";
  lightboxImg.src = img.src;
}

lightbox.onclick = () => lightbox.style.display = "none";

/* SHOW */
document.body.style.visibility = "visible";
</script>

</body>
</html>
